<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Event Registration Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div id="app">
      <nav id="navbar" class="sticky top-0 z-50 bg-white shadow flex flex-wrap justify-between items-center px-4 py-3 gap-2">
        <div id="logo" class="flex items-center gap-2 text-xl font-bold text-indigo-700 whitespace-nowrap">
          🎓 EduEvents
        </div>
        <input
          id="searchInput"
          type="text"
          placeholder="Search events…"
          class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm w-full sm:w-64 min-w-0 focus:outline-none focus:ring-2 focus:ring-indigo-400"
        />
      </nav>

      <section id="hero" class="bg-gradient-to-r from-blue-600 to-indigo-700 text-center py-16 px-4">
        <h1 class="text-3xl sm:text-4xl font-bold text-white mb-4">
          Student Event Registration Dashboard
        </h1>
        <p class="text-blue-100 text-base sm:text-lg max-w-xl mx-auto">
          Browse, register, and manage school events all in one place.
        </p>
      </section>

      <section id="stats" class="bg-gray-50 py-10 px-4">
        <div class="max-w-4xl mx-auto grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div class="bg-white rounded-xl shadow p-6 flex flex-col items-center gap-2 border-t-4 border-blue-500">
            <span class="text-sm font-medium text-gray-500 uppercase tracking-wide">Total Events</span>
            <span id="statTotalEvents" class="text-4xl font-bold text-blue-600">0</span>
          </div>
          <div class="bg-white rounded-xl shadow p-6 flex flex-col items-center gap-2 border-t-4 border-green-500">
            <span class="text-sm font-medium text-gray-500 uppercase tracking-wide">Total Registered</span>
            <span id="statTotalRegistered" class="text-4xl font-bold text-green-600">0</span>
          </div>
          <div class="bg-white rounded-xl shadow p-6 flex flex-col items-center gap-2 border-t-4 border-orange-500">
            <span class="text-sm font-medium text-gray-500 uppercase tracking-wide">Remaining Seats</span>
            <span id="statTotalRemaining" class="text-4xl font-bold text-orange-500">0</span>
          </div>
        </div>
      </section>

      <section id="eventsSection" class="py-10 px-4 bg-gray-100">
        <div class="max-w-6xl mx-auto">
          <h2 class="text-2xl font-bold text-gray-800 mb-6">Available Events</h2>
          <div id="eventsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
      </section>

      <section id="addEventSection" class="py-10 px-4 bg-white">
        <div class="max-w-lg mx-auto">
          <h2 class="text-2xl font-bold text-gray-800 mb-6">Add New Event</h2>
          <div class="bg-gray-50 rounded-xl shadow p-6 border border-gray-200">
            <form id="addEventForm" class="flex flex-col gap-4" novalidate>
              <div class="flex flex-col gap-1">
                <label for="eventTitle" class="text-sm font-medium text-gray-700">Event Title</label>
                <input id="eventTitle" type="text" placeholder="Event Title" class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent" />
              </div>
              <div class="flex flex-col gap-1">
                <label for="eventCategory" class="text-sm font-medium text-gray-700">Category</label>
                <input id="eventCategory" type="text" placeholder="Category" class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent" />
              </div>
              <div class="flex flex-col gap-1">
                <label for="eventSeats" class="text-sm font-medium text-gray-700">Number of Seats</label>
                <input id="eventSeats" type="number" placeholder="Number of Seats" min="1" class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent" />
              </div>
              <div id="formError" class="hidden text-red-600 text-sm mt-1"></div>
              <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors duration-150 mt-1">Add Event</button>
            </form>
          </div>
        </div>
      </section>
    </div>

    <footer class="bg-gray-800 text-gray-400 text-center text-sm py-4">
      © 2025 EduEvents — Student Event Registration Dashboard
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
